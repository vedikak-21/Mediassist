<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B1220" />
  <title>{{ title or 'MediAssist' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="auth-shell">
    <main class="auth-card" role="main">
      <div class="auth-brand">
        <div class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v1H8a3 3 0 0 0-3 3v1H4a2 2 0 0 0 0 4h1v1a3 3 0 0 0 3 3h1v1a3 3 0 0 0 6 0v-1h1a3 3 0 0 0 3-3v-1h1a2 2 0 0 0 0-4h-1V9a3 3 0 0 0-3-3h-1V5a3 3 0 0 0-3-3Z"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
        </div>
        <div>
          <h1>MediAssist</h1>
          <p class="muted">Secure access to your AI health companion.</p>
        </div>
      </div>

      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
