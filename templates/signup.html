{% extends 'auth_base.html' %}
{% block content %}
  <div class="auth-panel">
    <div class="auth-panel__head">
      <h2>Create your account</h2>
      <p>Sign up to access your personalized MediAssist dashboard.</p>
    </div>

    {% if error %}
      <div class="auth-alert">{{ error }}</div>
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="auth-form">
      <label>
        Full name
        <input type="text" name="full_name" placeholder="Your full name" required />
      </label>

      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com" required />
      </label>

      <label>
        Password
        <input type="password" name="password" placeholder="Create a password" required />
      </label>

      <label>
        Confirm password
        <input type="password" name="confirm_password" placeholder="Repeat your password" required />
      </label>

      <label>
        Profile picture
        <input type="file" name="profile_picture" accept="image/png,image/jpeg,image/jpg,image/gif" />
      </label>

      <button type="submit" class="btn btn--primary btn--block">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
{% endblock %}
